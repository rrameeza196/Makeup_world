version: '3.8'

services:

  # PHP + Apache (your website)
  app:
    build: .
    container_name: makeup_app
    ports:
      - "8080:80"         # Visit http://localhost:8080
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: makeup123
      DB_NAME: makeup_db
    volumes:
      - .:/var/www/html   # Live reload — edit files and changes appear instantly
    networks:
      - makeup_network

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: makeup_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: makeup123
      MYSQL_DATABASE: makeup_db
    ports:
      - "3307:3306"       # Access DB on port 3307 (avoids conflict with local MySQL)
    volumes:
      - db_data:/var/lib/mysql          # Persistent data (won't delete on restart)
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql  # Auto-import DB on first run
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pmakeup123"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - makeup_network

  # phpMyAdmin (optional — visual DB manager)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: makeup_phpmyadmin
    ports:
      - "8081:80"         # Visit http://localhost:8081
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: makeup123
    depends_on:
      - db
    networks:
      - makeup_network

volumes:
  db_data:

networks:
  makeup_network:
    driver: bridge
